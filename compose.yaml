# ローカル開発用。アプリ本体は `go run ./cmd/server` でホスト側から接続する想定。
#   docker compose up -d        # MySQL を起動
#   docker compose down         # 停止 (データは volume に永続)
#   docker compose down -v      # データごと破棄
services:
  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: effort_tracker
      MYSQL_USER: app
      MYSQL_PASSWORD: app
      MYSQL_ROOT_PASSWORD: root
      TZ: UTC
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 20s

volumes:
  mysql-data:
